<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Puzzle | CSP Solver</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --neon-blue: #38bdf8;
            --neon-green: #4ade80;
            --text-color: #f1f5f9;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 { font-weight: 300; letter-spacing: 2px; margin-bottom: 1.5rem; color: var(--neon-blue); }

        .grid {
    display: grid;
    grid-template-columns: repeat(9, 50px);
    gap: 1px; /* Decreased gap for sharper lines */
    background: #334155; /* Solid slate color for grid lines */
    padding: 2px;
    border-radius: 8px;
    border: 3px solid var(--neon-blue); /* Thicker outer border */
}

        input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: white;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            background: rgba(56, 189, 248, 0.2);
            box-shadow: inset 0 0 10px var(--neon-blue);
        }

        /* 3x3 Subgrid Borders */
        input:nth-child(3n) { border-right: 3px solid var(--neon-blue); }
        input:nth-child(9n) { border-right: none; }
        .grid > input:nth-child(n+19):nth-child(-n+27),
        .grid > input:nth-child(n+46):nth-child(-n+54) { border-bottom: 3px solid var(--neon-blue); }

        .prefilled {
            color: var(--neon-blue);
            font-weight: 800;
            background: rgba(255, 255, 255, 0.05);
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-check { background: transparent; color: white; border: 1px solid white; }
        .btn-solve { background: var(--neon-blue); color: #0f172a; box-shadow: 0 0 15px var(--neon-blue); }

        button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4); }

        #msg { margin-top: 1.5rem; min-height: 1.5rem; font-weight: bold; color: var(--neon-green); }
    </style>
</head>
<body>
    <div class="container">
        <h1><span style="font-weight: 1000;">SUDOKU PUZZLE</span></h1>
        <div class="grid" id="grid">
            {% for row in range(9) %}
                {% for col in range(9) %}
                    <input type="number" 
                           class="{{ 'prefilled' if board[row][col] != 0 else '' }}"
                           value="{{ board[row][col] if board[row][col] != 0 else '' }}"
                           {{ 'readonly' if board[row][col] != 0 else '' }}
                           data-row="{{ row }}" data-col="{{ col }}">
                {% endfor %}
            {% endfor %}
        </div>

        <div id="msg">Ready to solve...</div>

        <div class="controls">
            <button class="btn-check" onclick="checkUserSolution()">Verify Logic</button>
            <button class="btn-solve" onclick="solveWithCSP()">Solve with AI</button>
        </div>
    </div>

    <script>
        function getBoard() {
            let board = Array.from({ length: 9 }, () => Array(9).fill(0));
            document.querySelectorAll('input').forEach(i => {
                board[i.dataset.row][i.dataset.col] = parseInt(i.value) || 0;
            });
            return board;
        }

        async function solveWithCSP() {
            document.getElementById('msg').innerText = "AI is thinking...";
            const res = await fetch('/solve', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({board: getBoard()})
            });
            const data = await res.json();
            if(data.status === "success") {
                document.querySelectorAll('input').forEach(i => {
                    const val = data.solution[i.dataset.row][i.dataset.col];
                    if(!i.classList.contains('prefilled')) {
                        i.value = val;
                        i.style.color = "#4ade80"; // Green for AI-solved numbers
                    }
                });
                document.getElementById('msg').innerText = "Puzzle solved with AI";
            }
        }

        async function checkUserSolution() {
            const res = await fetch('/check', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({board: getBoard()})
            });
            const data = await res.json();
            const msg = document.getElementById('msg');
            msg.innerText = data.result;
            msg.style.color = data.result === "You Won!" ? "#4ade80" : "#fb7185";
        }
    </script>
</body>
</html>
